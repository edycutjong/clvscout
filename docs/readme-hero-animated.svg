<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" width="1200" height="360" role="img" aria-label="CLV Scout — you can win the bet and still be wrong: grade every pick against the closing line, not the scoreboard">
  <title>CLV Scout — grade every pick against the closing line</title>
  <!-- Fully standalone animated hero. GitHub-safe: CSS @keyframes only — no scripts,
       no external fonts/images/styles, no SMIL needed. Brand hex inlined from _tokens.css:
       graphite #0B0E11, verdict green #00D084, grade amber #FFB300,
       text #F2F3F7 / #8A93A6, signal red #FF4D5E.
       Entrance choreography plays once, then gentle infinite idles keep it alive.
       Full prefers-reduced-motion static fallback below. -->
  <defs>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#B4BCCC"/>
    </linearGradient>
    <linearGradient id="shineGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#FFFFFF" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#FFFFFF" stop-opacity="0.05"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="pathGrad" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#00D084" stop-opacity="0.5"/>
      <stop offset="0.55" stop-color="#00D084"/>
      <stop offset="1" stop-color="#FFB300"/>
    </linearGradient>
    <linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#00D084" stop-opacity="0.13"/>
      <stop offset="1" stop-color="#00D084" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glowL" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#00D084" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#00D084" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowR" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#FFB300" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#FFB300" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nodeGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#00D084" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#00D084" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#F2F3F7" stroke-opacity="0.045"/>
    </pattern>
    <clipPath id="frame"><rect width="1200" height="360" rx="14"/></clipPath>
    <clipPath id="wordClip"><text x="62" y="150" class="sans title">CLV Scout</text></clipPath>
    <clipPath id="areaClip"><path d="M690 290 L770 250 L840 272 L920 214 L985 232 L1075 128 L1075 312 L690 312 Z"/></clipPath>
  </defs>

  <style>
    .sans { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Helvetica, Arial, sans-serif; }
    .mono { font-family: ui-monospace, "SF Mono", "Cascadia Mono", Menlo, Consolas, monospace; }
    .title   { font-size: 62px; font-weight: 800; letter-spacing: -1.5px; }
    .eyebrow { font-size: 13px; letter-spacing: 3px; }
    .tag     { font-size: 16px; font-style: italic; }
    .chip-t  { font-size: 12.5px; letter-spacing: 0.5px; }
    .axis    { font-size: 11px; letter-spacing: 1.6px; }
    .grade   { font-size: 14px; font-weight: 700; letter-spacing: 0.5px; }

    /* ---- entrance choreography (spring easing, plays once) ---- */
    .rise { animation: rise 0.85s cubic-bezier(0.22, 0.61, 0.36, 1) both; }
    .fade { animation: fade 1.1s ease both; }
    .pop  { transform-box: fill-box; transform-origin: center;
            animation: pop 0.6s cubic-bezier(0.34, 1.7, 0.5, 1) both; }
    .d0 { animation-delay: 0.10s; } .d1 { animation-delay: 0.25s; }
    .d2 { animation-delay: 0.42s; } .d3 { animation-delay: 0.58s; }
    .c1 { animation-delay: 0.62s; } .c2 { animation-delay: 0.74s; } .c3 { animation-delay: 0.86s; }
    .dM { animation-delay: 2.55s; } .dG { animation-delay: 2.85s; }

    /* draw the price path in, base = fully drawn (static fallback) */
    .draw  { stroke-dasharray: 100; stroke-dashoffset: 0;
             animation: draw 1.75s cubic-bezier(0.65, 0, 0.35, 1) 0.85s both; }

    /* traveling glow dot at the pen tip; base opacity 0 so static hides it */
    .tracer { opacity: 0;
              offset-path: path("M690 290 L770 250 L840 272 L920 214 L985 232 L1075 128");
              offset-distance: 100%; offset-rotate: 0deg;
              animation: trace 1.75s cubic-bezier(0.65, 0, 0.35, 1) 0.85s both; }

    /* ---- infinite idles (never frozen, seamless) ---- */
    .glowA { animation: driftA 13s ease-in-out infinite; }
    .glowB { animation: driftB 15s ease-in-out infinite; }
    .scan  { animation: scan 9s linear infinite; }
    .sweep { animation: sweep 11s ease-in-out infinite; }
    .drift { animation: cldrift 14s linear infinite; }
    .shimmer { transform: translateX(-180px);
               animation: shimmer 6.5s ease-in-out 1.6s infinite; }
    .pulse { transform-box: fill-box; transform-origin: center; opacity: 0;
             animation: pulse 4.6s ease-out 3.1s infinite; }
    .breathe { animation: breathe 4.6s ease-in-out 3.1s infinite; }
    .area-b { animation: areaBreathe 6s ease-in-out 3s infinite; }

    /* ---- scope reticle mark (replaces the emoji) ---- */
    .ret-in   { transform-box: fill-box; transform-origin: center;
                animation: pop 0.7s cubic-bezier(0.34, 1.7, 0.5, 1) 1.05s both; }
    .ret-beat { transform-box: fill-box; transform-origin: center;
                animation: retbeat 5s ease-in-out 3.2s infinite; }
    .retspin  { transform-box: fill-box; transform-origin: center;
                animation: retspin 9s linear infinite; }
    .retdot   { transform-box: fill-box; transform-origin: center;
                animation: retdot 3.4s ease-in-out 1.6s infinite; }
    .lockring { transform-box: fill-box; transform-origin: center; opacity: 0;
                animation: lockring 5s ease-out 3.4s infinite; }
    @keyframes retspin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes retbeat { 0%,100% { transform: scale(1); } 50% { transform: scale(1.08); } }
    @keyframes retdot  { 0%,100% { transform: scale(1); } 50% { transform: scale(1.28); } }
    @keyframes lockring { 0% { opacity: 0.55; transform: scale(0.6); }
                          60% { opacity: 0; transform: scale(1.7); }
                          100% { opacity: 0; transform: scale(1.7); } }

    @keyframes rise  { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fade  { from { opacity: 0; } to { opacity: 1; } }
    @keyframes pop   { 0% { opacity: 0; transform: translateY(8px) scale(0.8); }
                       60% { opacity: 1; transform: translateY(0) scale(1.06); }
                       100% { opacity: 1; transform: translateY(0) scale(1); } }
    @keyframes draw  { from { stroke-dashoffset: 100; } to { stroke-dashoffset: 0; } }
    @keyframes trace { 0% { offset-distance: 0%; opacity: 0; }
                       10% { opacity: 1; } 86% { opacity: 1; }
                       100% { offset-distance: 100%; opacity: 0; } }
    @keyframes driftA { 0%,100% { transform: translate(0,0) scale(1); }
                        50% { transform: translate(46px,26px) scale(1.14); } }
    @keyframes driftB { 0%,100% { transform: translate(0,0) scale(1.05); }
                        50% { transform: translate(-40px,-22px) scale(0.92); } }
    @keyframes scan  { 0% { transform: translateY(-40px); opacity: 0; }
                       12% { opacity: 1; } 88% { opacity: 1; }
                       100% { transform: translateY(220px); opacity: 0; } }
    @keyframes sweep { 0% { transform: translateX(-520px) skewX(-16deg); }
                       28% { transform: translateX(1480px) skewX(-16deg); }
                       100% { transform: translateX(1480px) skewX(-16deg); } }
    @keyframes cldrift { from { stroke-dashoffset: 0; } to { stroke-dashoffset: -128; } }
    @keyframes shimmer { 0% { transform: translateX(-180px); }
                         26% { transform: translateX(600px); }
                         100% { transform: translateX(600px); } }
    @keyframes pulse { 0% { opacity: 0.7; transform: scale(1); }
                       55% { opacity: 0; transform: scale(3.4); }
                       100% { opacity: 0; transform: scale(3.4); } }
    @keyframes breathe { 0%,100% { transform: scale(1); opacity: 0.55; }
                         50% { transform: scale(1.35); opacity: 0.9; } }
    @keyframes areaBreathe { 0%,100% { opacity: 0.75; } 50% { opacity: 1; } }

    /* ---- static, complete scene for reduced motion ---- */
    @media (prefers-reduced-motion: reduce) {
      .rise, .fade, .pop, .draw, .tracer, .glowA, .glowB, .scan, .sweep,
      .drift, .shimmer, .pulse, .breathe, .area-b,
      .ret-in, .ret-beat, .retspin, .retdot, .lockring { animation: none; }
      .tracer, .pulse, .scan, .lockring { opacity: 0; }
      .shimmer { transform: translateX(-180px); }
    }
  </style>

  <!-- ======== backdrop + atmosphere ======== -->
  <g clip-path="url(#frame)">
    <rect width="1200" height="360" fill="#0B0E11"/>
    <!-- slow drifting parallax glows -->
    <g class="glowA"><ellipse cx="150" cy="70" rx="360" ry="300" fill="url(#glowL)"/></g>
    <g class="glowB"><ellipse cx="1050" cy="330" rx="380" ry="300" fill="url(#glowR)"/></g>
    <g class="glowA"><ellipse cx="900" cy="120" rx="300" ry="240" fill="url(#glowL)" opacity="0.5"/></g>
    <!-- grid + moving scanline (behind chart) -->
    <rect width="1200" height="360" fill="url(#grid)"/>
    <rect class="scan" x="640" y="0" width="540" height="2" fill="#00D084" opacity="0.25"/>
    <!-- wide diagonal light sheen -->
    <rect class="sweep" x="0" y="-120" width="220" height="600" fill="url(#sheen)"/>
  </g>
  <rect x="0.5" y="0.5" width="1199" height="359" rx="14" fill="none" stroke="#FFFFFF" stroke-opacity="0.08"/>

  <!-- ======== left: identity ======== -->
  <text x="64" y="88" class="mono eyebrow rise d0" fill="#8A93A6">OKX.AI GENESIS 2026 · FINANCE AGENT</text>

  <!-- wordmark + light-sweep shimmer clipped to the glyphs -->
  <g class="rise d1">
    <text x="62" y="150" class="sans title" fill="url(#titleGrad)">CLV Scout</text>
    <g clip-path="url(#wordClip)">
      <rect class="shimmer" x="-60" y="90" width="120" height="90" fill="url(#shineGrad)" transform="skewX(-18)"/>
    </g>
    <!-- inline scope reticle mark (replaced the target emoji) — lock-on: dashed ring spins, ticks fixed, amber core pulses -->
    <g transform="translate(386,126)">
      <g class="ret-in">
        <g class="ret-beat">
          <circle class="lockring" r="15" fill="none" stroke="#00D084" stroke-width="2"/>
          <g class="retspin">
            <circle r="20" fill="none" stroke="#00D084" stroke-width="3" stroke-dasharray="16 12" stroke-linecap="round" opacity="0.9"/>
          </g>
          <g stroke="#00D084" stroke-width="3" stroke-linecap="round">
            <line x1="0" y1="-24" x2="0" y2="-14"/>
            <line x1="0" y1="14" x2="0" y2="24"/>
            <line x1="-24" y1="0" x2="-14" y2="0"/>
            <line x1="14" y1="0" x2="24" y2="0"/>
          </g>
          <circle r="10" fill="none" stroke="#00D084" stroke-width="2" opacity="0.5"/>
          <circle class="retdot" r="4.5" fill="#FFB300"/>
        </g>
      </g>
    </g>
  </g>

  <text x="64" y="196" class="sans tag rise d2" fill="#8A93A6">You can win the bet and still be wrong —</text>
  <text x="64" y="222" class="sans tag rise d2" fill="#8A93A6">grade every pick against the closing line, not the scoreboard.</text>

  <g>
    <g class="pop c1">
      <rect x="64" y="256" width="158" height="32" rx="16" fill="#00D084" fill-opacity="0.10" stroke="#00D084" stroke-opacity="0.45"/>
      <text x="143" y="277" text-anchor="middle" class="mono chip-t" fill="#00D084">x402 · $0.01/CALL</text>
    </g>
    <g class="pop c2">
      <rect x="236" y="256" width="182" height="32" rx="16" fill="#FFB300" fill-opacity="0.10" stroke="#FFB300" stroke-opacity="0.45"/>
      <text x="327" y="277" text-anchor="middle" class="mono chip-t" fill="#FFB300">X LAYER · eip155:196</text>
    </g>
    <g class="pop c3">
      <rect x="432" y="256" width="168" height="32" rx="16" fill="#FFFFFF" fill-opacity="0.04" stroke="#FFFFFF" stroke-opacity="0.14"/>
      <text x="516" y="277" text-anchor="middle" class="mono chip-t" fill="#8A93A6">A2MCP · PER-CALL</text>
    </g>
  </g>

  <!-- ======== right: the closing-line verdict ======== -->
  <!-- shaded value under the price path (gentle breathe) -->
  <g clip-path="url(#areaClip)">
    <rect class="fade area-b" x="690" y="120" width="390" height="192" fill="url(#areaGrad)"/>
  </g>

  <!-- market's closing line, drifting -->
  <line class="drift" x1="660" y1="168" x2="1160" y2="168" stroke="#FFB300" stroke-width="2" stroke-dasharray="3 9" opacity="0.85"/>
  <text x="670" y="154" class="mono axis fade d2" fill="#FFB300">CLOSING LINE -110</text>

  <!-- your price path: draws itself up through the close -->
  <path class="draw" d="M690 290 L770 250 L840 272 L920 214 L985 232 L1075 128" pathLength="100"
        fill="none" stroke="url(#pathGrad)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- traveling glow dot at the pen tip -->
  <g class="tracer">
    <circle r="16" fill="url(#nodeGlow)"/>
    <circle r="5.5" fill="#F2F3F7"/>
  </g>

  <!-- entry point -->
  <circle class="fade d2" cx="690" cy="290" r="4" fill="#8A93A6"/>
  <text x="676" y="320" class="mono axis fade d2" fill="#8A93A6">YOUR PICK +102</text>

  <!-- verdict marker: lands above the close with a shockwave + glow pulse -->
  <circle class="pulse" cx="1075" cy="128" r="9" fill="none" stroke="#00D084" stroke-width="2.5"/>
  <circle class="breathe" cx="1075" cy="128" r="15" fill="url(#nodeGlow)"/>
  <g class="pop dM">
    <circle cx="1075" cy="128" r="8" fill="#00D084"/>
    <circle cx="1075" cy="128" r="3" fill="#0B0E11"/>
  </g>

  <!-- the grade, springy overshoot pop -->
  <g class="pop dG">
    <rect x="982" y="66" width="176" height="36" rx="18" fill="#00D084" fill-opacity="0.12" stroke="#00D084" stroke-opacity="0.55"/>
    <text x="1070" y="89" text-anchor="middle" class="mono grade" fill="#00D084">A+ · +4.2% CLV</text>
  </g>
</svg>
