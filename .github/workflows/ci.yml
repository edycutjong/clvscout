name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same PR/branch
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # ── STAGE 1: Code Quality (parallel with Stage 2) ─────────
  quality:
    name: "Stage 1 · Quality"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Full matrix on main push, single node on PRs (saves CI minutes)
        node-version: ${{ github.event_name == 'push' && fromJSON('[20, 22]') || fromJSON('[20]') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v7
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Lint (eslint)
        run: npm run lint
      - name: Type check
        run: npm run typecheck
      - name: Unit tests with coverage (vitest)
        run: npm run test:coverage
      - name: Upload coverage report
        if: matrix.node-version == 20
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          retention-days: 7

  # ── STAGE 2: Security Gate (parallel with Stage 1) ────────
  secret-scan:
    name: "Stage 2 · Secret Scanning"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history for scanning git commits
      - name: TruffleHog Secret Scan
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified

  dependency-audit:
    name: "Stage 2 · Dependency Audit"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: npm audit (high + critical)
        run: npm audit --audit-level=high
        continue-on-error: true # Don't block on transitive dev-only dep issues (tracked, see README)
      - name: License compliance check
        run: npx license-checker --production --failOn "GPL-3.0;AGPL-3.0" --summary
        continue-on-error: true

  # ── STAGE 3: Build Verification ───────────────────────────
  build:
    name: "Stage 3 · Build Verification"
    needs: [quality]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: TypeScript project build check (tsc --noEmit)
        run: npx tsc --noEmit
        # No bundle output for this service — it ships as tsx-run TypeScript
        # (see package.json `api`/`dev` scripts). `tsc --noEmit` is the real
        # build gate; Stage 4 boots the actual entrypoint as a stronger proof.

  # ── STAGE 4: API Smoke Test ───────────────────────────────
  api-smoke:
    name: "Stage 4 · API Smoke"
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Boot API server
        run: nohup npx tsx api/main.ts > server.log 2>&1 &
        env:
          PORT: "4021"
      - name: Wait for server to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:4021/health > /dev/null; then
              echo "server is up"
              exit 0
            fi
            sleep 1
          done
          echo "::error::server did not become ready in time"
          cat server.log || true
          exit 1
      - name: "Self-check — POST /api/grade unpaid -> 402 + x402Version:2"
        run: |
          STATUS=$(curl -s -o /tmp/grade.json -w "%{http_code}" -X POST http://localhost:4021/api/grade -H "Content-Type: application/json" -d '{}')
          echo "status=$STATUS"; cat /tmp/grade.json
          test "$STATUS" = "402"
          grep -q '"x402Version":2' /tmp/grade.json
      - name: "Self-check — POST /api/audit unpaid -> 402 + x402Version:2"
        run: |
          STATUS=$(curl -s -o /tmp/audit.json -w "%{http_code}" -X POST http://localhost:4021/api/audit -H "Content-Type: application/json" -d '{}')
          echo "status=$STATUS"; cat /tmp/audit.json
          test "$STATUS" = "402"
          grep -q '"x402Version":2' /tmp/audit.json
      - name: "Self-check — GET /api/grade -> 405"
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X GET http://localhost:4021/api/grade)
          echo "status=$STATUS"
          test "$STATUS" = "405"
      - name: "Self-check — POST /api/calibration (free) -> 200"
        run: |
          STATUS=$(curl -s -o /tmp/calibration.json -w "%{http_code}" -X POST http://localhost:4021/api/calibration -H "Content-Type: application/json" -d '{}')
          echo "status=$STATUS"; cat /tmp/calibration.json
          test "$STATUS" = "200"
          grep -q '"coverage"' /tmp/calibration.json
      - name: Dump server log on failure
        if: failure()
        run: cat server.log || true

  # ── STAGE 5: Deploy Gate (main only) ──────────────────────
  deploy-gate:
    name: "Stage 5 · Deploy Gate"
    needs: [quality, secret-scan, dependency-audit, build, api-smoke]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: All gates passed
        run: |
          echo "All CI/CD gates passed!"
          echo ""
          echo "Pipeline Summary:"
          echo "  - Stage 1 - Quality (typecheck, vitest, coverage; Node 20/22)"
          echo "  - Stage 2 - Secret Scanning (TruffleHog)"
          echo "  - Stage 2 - Dependency Audit (npm audit + license-checker)"
          echo "  - Stage 3 - Build Verification (tsc)"
          echo "  - Stage 4 - API Smoke (402/402/405/200 self-check)"
